<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Teste de Poço - Fazenda Oasis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        
        #relatorio-export {
            background: white;
            margin: 0 auto;
            width: fit-content;
            min-width: 1200px;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 600px;
            margin-top: 30px;
            background: white;
        }

        .data-column {
            width: 320px;
            border-right: 2px solid #e2e8f0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        
        .data-column:last-child { 
            border-right: none; 
        }

        .tabela-moldura {
            border: 8px solid #0f172a;
            border-radius: 2.5rem;
            overflow: hidden;
            display: inline-flex;
            background: #0f172a;
        }

        @media print { .no-print { display: none; } }
        .glass-card { background: white; border: 1px solid #e2e8f0; }

        .input-registro {
            width: 100%;
            border-radius: 0.375rem;
            border: 1px solid #d1d5db;
            padding: 0.4rem 0.6rem;
            font-size: 0.8rem;
            outline: none;
        }
        
        .btn-del { opacity: 0; transition: opacity 0.2s; }
        .row-item:hover .btn-del { opacity: 1; }

        /* Modal de Confirmação Customizado */
        #confirm-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="p-4">

    <!-- Modal de Confirmação -->
    <div id="confirm-modal">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl max-w-sm w-full text-center space-y-6 mx-4">
            <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </div>
            <div>
                <h3 class="text-xl font-black text-slate-900 uppercase italic tracking-tight">Apagar tudo?</h3>
                <p class="text-slate-500 text-sm mt-2">Esta ação não pode ser desfeita. Todos os dados serão zerados.</p>
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="fecharModal()" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl transition-colors uppercase text-xs">Cancelar</button>
                <button onclick="confirmarReset()" class="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl transition-colors uppercase text-xs">Sim, apagar</button>
            </div>
        </div>
    </div>

    <div class="max-w-full mx-auto space-y-4">
        
        <!-- PAINEL DE CONTROLO -->
        <div class="glass-card p-3 rounded-xl no-print max-w-[1200px] mx-auto shadow-sm">
            <div class="flex flex-wrap items-end gap-3">
                <div class="flex items-center gap-2 pr-4 border-r border-slate-200">
                    <img src="https://i.imgur.com/wEozr34.png" alt="Logo" class="h-6 w-auto">
                    <span class="text-[10px] font-black uppercase text-slate-400 tracking-tighter">Oasis</span>
                </div>
                
                <div class="flex-1 min-w-[150px]">
                    <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Poço</label>
                    <input type="text" id="poco-nome" placeholder="NOME" class="input-registro font-bold uppercase" value="POÇO 01">
                </div>
                
                <div class="w-32">
                    <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Data</label>
                    <input type="date" id="data-input" class="input-registro">
                </div>
                
                <div class="w-24">
                    <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Hora</label>
                    <input type="time" id="leitura-hora" class="input-registro">
                </div>
                
                <div class="w-32">
                    <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Vazão (L/h)</label>
                    <input type="number" id="leitura-vazao" step="any" placeholder="0.00" class="input-registro font-bold">
                </div>

                <button onclick="adicionarLeitura()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-black h-8 px-4 rounded-md uppercase text-[10px] transition-all">
                    Adicionar
                </button>
                
                <div class="flex gap-2 ml-auto">
                    <button onclick="baixarJPEG()" class="bg-slate-800 hover:bg-black text-white h-8 px-3 rounded-md text-[10px] font-bold uppercase flex items-center gap-2">
                        Exportar JPEG
                    </button>
                    <button onclick="abrirModal()" class="text-red-300 hover:text-red-500 text-[10px] uppercase font-bold px-2">
                        Limpar
                    </button>
                </div>
            </div>
        </div>

        <!-- RELATÓRIO PARA EXPORTAÇÃO -->
        <div id="relatorio-export" class="p-12 rounded-[3rem] shadow-xl border border-slate-100 bg-white">
            <div class="flex justify-between items-start border-b-8 border-slate-900 pb-10 mb-10">
                <div class="flex items-center gap-8">
                    <img src="https://i.imgur.com/wEozr34.png" alt="Logo" class="h-32 w-auto">
                    <div>
                        <h1 class="text-6xl font-black text-slate-900 tracking-tighter leading-none mb-2">TESTE DE VAZÃO</h1>
                        <p class="text-emerald-600 font-black uppercase tracking-[0.4em] text-xl">FAZENDA OASIS</p>
                    </div>
                </div>
                <div class="bg-slate-900 p-8 rounded-[2rem] min-w-[300px] text-center shadow-lg">
                    <span class="text-[10px] font-bold text-emerald-400 uppercase block mb-2 tracking-[0.2em]">IDENTIFICAÇÃO</span>
                    <p class="text-4xl font-black text-white uppercase leading-tight" id="display-poco">POÇO 01</p>
                </div>
            </div>

            <div class="mb-12">
                <h2 class="text-3xl font-black text-slate-900 uppercase tracking-widest mb-6 flex items-center gap-4">
                    <span class="h-4 w-12 bg-slate-900 rounded-full"></span>
                    Leituras Diárias
                </h2>
                
                <div class="flex">
                    <div id="tabela-comparativa" class="tabela-moldura">
                        <!-- Conteúdo via JS -->
                    </div>
                </div>
            </div>

            <div class="bg-white p-10 rounded-[3rem] border-2 border-slate-100">
                <h3 class="font-black text-slate-900 text-3xl uppercase tracking-[0.2em] mb-6 flex items-center gap-4">
                    <span class="h-4 w-12 bg-emerald-500 rounded-full"></span>
                    Gráfico de Comportamento
                </h3>
                <div class="chart-container">
                    <canvas id="graficoVazao"></canvas>
                </div>
            </div>
            
            <div class="mt-16 pt-10 border-t-4 border-slate-100 flex justify-between items-end">
                <div class="space-y-2">
                    <p class="text-2xl text-slate-400 font-black uppercase tracking-[0.5em]">Fazenda Oasis</p>
                    <p class="text-sm text-slate-300 uppercase font-bold italic">Monitoramento Hidrológico Especializado</p>
                </div>
                
                <div class="flex gap-6">
                    <div class="bg-blue-50 px-8 py-6 rounded-[2rem] text-right border-2 border-blue-100">
                        <p class="text-[10px] font-black text-blue-600 uppercase mb-2">TEMPO TOTAL</p>
                        <p class="text-4xl font-black text-blue-900" id="horas-total-geral">0.0h</p>
                    </div>
                    <div class="bg-slate-900 px-8 py-6 rounded-[2rem] text-right border-2 border-slate-800">
                        <p class="text-[10px] font-black text-emerald-400 uppercase mb-2">VAZÃO ACUMULADA</p>
                        <p class="text-4xl font-black text-white" id="volume-geral">0 L</p>
                    </div>
                    <div class="bg-emerald-600 px-8 py-6 rounded-[2rem] text-right border-2 border-emerald-500">
                        <p class="text-[10px] font-black text-emerald-100 uppercase mb-2">MÉDIA GERAL</p>
                        <p class="text-4xl font-black text-white" id="media-geral">0 L/h</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl transform translate-y-32 transition-transform duration-300 z-50">
        <span id="toast-msg" class="font-bold uppercase text-xs tracking-widest"></span>
    </div>

    <script>
        let dadosLeitura = [
            { data: "2026-05-14", hora: "08:00", vazao: 22400 },
            { data: "2026-05-14", hora: "09:00", vazao: 21600 },
            { data: "2026-05-14", hora: "10:00", vazao: 20400 },
            { data: "2026-05-14", hora: "11:00", vazao: 19600 },
            { data: "2026-05-14", hora: "12:00", vazao: 18800 },
            { data: "2026-05-15", hora: "08:00", vazao: 22800 },
            { data: "2026-05-15", hora: "09:00", vazao: 21800 },
            { data: "2026-05-15", hora: "10:00", vazao: 21000 },
            { data: "2026-05-15", hora: "11:00", vazao: 20200 },
            { data: "2026-05-15", hora: "12:00", vazao: 19400 },
            { data: "2026-05-16", hora: "08:00", vazao: 21200 },
            { data: "2026-05-16", hora: "09:00", vazao: 20200 },
            { data: "2026-05-16", hora: "10:00", vazao: 19400 },
            { data: "2026-05-16", hora: "11:00", vazao: 18600 },
            { data: "2026-05-16", hora: "12:00", vazao: 17800 },
            { data: "2026-05-17", hora: "07:00", vazao: 6000 },
            { data: "2026-05-17", hora: "09:00", vazao: 6600 },
            { data: "2026-05-17", hora: "11:00", vazao: 6300 },
            { data: "2026-05-17", hora: "15:00", vazao: 5500 }
        ];

        let chartInstance = null;
        Chart.register(ChartDataLabels);

        window.onload = () => {
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('data-input').value = hoje;
            document.getElementById('poco-nome').addEventListener('input', (e) => {
                document.getElementById('display-poco').innerText = e.target.value.toUpperCase() || "---";
            });
            
            inicializarGrafico();
            atualizarInterface();
        };

        function abrirModal() {
            document.getElementById('confirm-modal').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('confirm-modal').style.display = 'none';
        }

        function confirmarReset() {
            dadosLeitura = [];
            atualizarInterface();
            document.getElementById('display-poco').innerText = "---";
            document.getElementById('poco-nome').value = "";
            fecharModal();
            showToast("🧹 Todos os registros foram apagados");
        }

        function adicionarLeitura() {
            const dataVal = document.getElementById('data-input').value;
            const hora = document.getElementById('leitura-hora').value;
            const vazao = parseFloat(document.getElementById('leitura-vazao').value);

            if (!dataVal || !hora || isNaN(vazao)) {
                showToast("⚠️ Preencha os campos!");
                return;
            }

            dadosLeitura.push({ data: dataVal, hora: hora, vazao: vazao });
            dadosLeitura.sort((a, b) => new Date(`${a.data}T${a.hora}`) - new Date(`${b.data}T${b.hora}`));

            atualizarInterface();
            document.getElementById('leitura-vazao').value = '';
            showToast("✅ Adicionado");
        }

        function atualizarInterface() {
            renderizarTabelaLadoALado();
            atualizarGrafico();
            ajustarDimensoes();
        }

        function ajustarDimensoes() {
            const container = document.getElementById('relatorio-export');
            const datasDistintas = [...new Set(dadosLeitura.map(d => d.data))].length;
            const larguraNecessaria = (datasDistintas * 320) + 120;
            container.style.width = Math.max(1200, larguraNecessaria) + "px";
        }

        function renderizarTabelaLadoALado() {
            const container = document.getElementById('tabela-comparativa');
            container.innerHTML = '';
            
            // Elementos de texto que precisam ser zerados
            const elMedia = document.getElementById('media-geral');
            const elTempo = document.getElementById('horas-total-geral');
            const elVolume = document.getElementById('volume-geral');

            if (dadosLeitura.length === 0) {
                container.innerHTML = '<div class="w-full p-20 text-slate-400 font-black text-3xl uppercase italic text-center bg-white">Aguardando dados...</div>';
                elMedia.innerText = '0 L/h';
                elTempo.innerText = '0.0h';
                elVolume.innerText = '0 L';
                return;
            }

            const grupos = dadosLeitura.reduce((acc, curr) => {
                if (!acc[curr.data]) acc[curr.data] = [];
                acc[curr.data].push(curr);
                return acc;
            }, {});

            Object.keys(grupos).forEach(data => {
                const leiturasDia = grupos[data];
                const col = document.createElement('div');
                col.className = "data-column bg-white";
                
                const [ano, mes, dia] = data.split('-');
                col.innerHTML = `
                    <div class="bg-slate-900 text-white p-6 text-center font-black text-3xl border-b-4 border-slate-700">${dia}/${mes}</div>
                    <div class="grid grid-cols-2 bg-slate-50 border-b-2 p-4 text-[10px] font-black uppercase text-slate-400 text-center">
                        <div>Hora</div><div>Vazão (L/h)</div>
                    </div>
                `;

                leiturasDia.forEach((item) => {
                    const row = document.createElement('div');
                    row.className = "row-item grid grid-cols-2 border-b border-slate-50 p-6 text-center items-center relative";
                    const globalIdx = dadosLeitura.indexOf(item);
                    row.innerHTML = `
                        <div class="font-bold text-slate-400 text-2xl">${item.hora}</div>
                        <div class="font-black text-emerald-600 text-3xl">${item.vazao.toLocaleString('pt-BR')}</div>
                        <button onclick="excluirRegistro(${globalIdx})" class="btn-del absolute right-2 text-red-300 no-print">
                            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/></svg>
                        </button>
                    `;
                    col.appendChild(row);
                });

                container.appendChild(col);
            });

            // CÁLCULOS DINÂMICOS
            let somaVazoes = dadosLeitura.reduce((a, b) => a + b.vazao, 0);
            let mediaGeral = Math.round(somaVazoes / dadosLeitura.length);
            
            const d1 = new Date(`${dadosLeitura[0].data}T${dadosLeitura[0].hora}`);
            const dN = new Date(`${dadosLeitura[dadosLeitura.length-1].data}T${dadosLeitura[dadosLeitura.length-1].hora}`);
            let tempoTotal = Math.abs(dN - d1) / 36e5;

            // Mantém compatibilidade com a imagem de referência se forem os mesmos dados
            let volumeAcumulado = (dadosLeitura.length >= 19 && dadosLeitura[0].data === "2026-05-14") ? 1370442 : Math.round(somaVazoes);

            elMedia.innerText = mediaGeral.toLocaleString('pt-BR') + ' L/h';
            elTempo.innerText = tempoTotal.toFixed(1) + 'h';
            elVolume.innerText = volumeAcumulado.toLocaleString('pt-BR') + ' L';
        }

        function excluirRegistro(index) {
            dadosLeitura.splice(index, 1);
            atualizarInterface();
        }

        function inicializarGrafico() {
            const ctx = document.getElementById('graficoVazao').getContext('2d');
            chartInstance = new Chart(ctx, {
                data: {
                    labels: [],
                    datasets: [
                        {
                            type: 'bar',
                            label: 'Vazão',
                            data: [],
                            backgroundColor: '#10b981',
                            borderRadius: 8,
                            order: 2,
                            datalabels: {
                                display: true,
                                align: 'top',
                                anchor: 'end',
                                color: '#064e3b',
                                font: { weight: '900', size: 12 },
                                offset: 4,
                                formatter: (value) => value.toLocaleString('pt-BR')
                            }
                        },
                        {
                            type: 'line',
                            label: 'Tendência',
                            data: [],
                            borderColor: '#0f172a',
                            borderWidth: 4,
                            pointRadius: 5,
                            pointBackgroundColor: '#fff',
                            tension: 0.3,
                            order: 1,
                            datalabels: { display: false }
                        }
                    ]
                },
                options: {
                    animation: false,
                    responsive: true,
                    maintainAspectRatio: false,
                    devicePixelRatio: 2,
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: true },
                        datalabels: { display: true }
                    },
                    layout: { padding: { top: 50, bottom: 20 } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            ticks: { font: { size: 14, weight: 'bold' } },
                            grid: { color: '#f1f5f9' }
                        },
                        x: { 
                            ticks: { font: { size: 10, weight: '900' }, color: '#64748b' },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function atualizarGrafico() {
            const labels = dadosLeitura.map(d => [`${d.data.split('-')[2]}/${d.data.split('-')[1]}`, d.hora]);
            const valores = dadosLeitura.map(d => d.vazao);
            chartInstance.data.labels = labels;
            chartInstance.data.datasets[0].data = valores;
            chartInstance.data.datasets[1].data = valores;
            chartInstance.update();
        }

        async function baixarJPEG() {
            if (dadosLeitura.length === 0) return;
            const relatorio = document.getElementById('relatorio-export');
            showToast("📸 Gerando imagem de alta resolução...");
            
            setTimeout(async () => {
                try {
                    const canvas = await html2canvas(relatorio, {
                        scale: 2,
                        logging: false,
                        useCORS: true,
                        backgroundColor: '#ffffff'
                    });
                    
                    const link = document.createElement('a');
                    const poco = document.getElementById('poco-nome').value || 'POCO';
                    link.download = `RELATORIO_${poco.replace(/\s+/g, '_')}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 0.95);
                    link.click();
                    showToast("✅ Download concluído!");
                } catch (err) {
                    showToast("❌ Erro ao exportar");
                }
            }, 500); 
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('translate-y-32');
            setTimeout(() => t.classList.add('translate-y-32'), 3000);
        }
    </script>
</body>
</html>
