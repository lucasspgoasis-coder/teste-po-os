<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Teste de Poço - Fazenda Oasis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; overflow-x: auto; }
        
        #relatorio-export {
            background: white;
            margin: 0 auto;
            transition: width 0.4s ease-in-out;
            min-width: 1000px;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 600px;
            margin-top: 40px;
        }

        .data-column {
            min-width: 300px;
            border-right: 4px solid #f1f5f9;
            flex: 1;
        }
        .data-column:last-child { border-right: none; }

        @media print { .no-print { display: none; } }
        .glass-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .hide-on-export { display: none !important; }

        .input-registro {
            width: 100%;
            border-radius: 1rem;
            border: 2px solid #e2e8f0;
            padding: 1.25rem;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        .input-registro:focus { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        
        .row-item:hover .btn-del { opacity: 1; }
        .btn-del { opacity: 0; transition: opacity 0.2s; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-full mx-auto space-y-8">
        
        <!-- PAINEL DE REGISTRO -->
        <div class="glass-card p-8 md:p-12 rounded-[2.5rem] no-print max-w-[1400px] mx-auto">
            <div class="flex items-center gap-6 mb-10 border-b-2 border-slate-50 pb-8">
                <div class="p-4 bg-emerald-50 rounded-2xl">
                    <img src="https://i.imgur.com/wEozr34.png" alt="Logo" class="h-14 w-auto">
                </div>
                <div>
                    <h2 class="text-2xl font-black uppercase tracking-tight text-slate-800">Registrar Vazão</h2>
                    <p class="text-emerald-600 font-bold text-sm uppercase tracking-widest">Organização Automática por Data</p>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase ml-2">Identificação do Poço</label>
                    <input type="text" id="poco-nome" placeholder="NOME DO POÇO" class="input-registro font-black uppercase">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase ml-2">Data da Leitura</label>
                    <input type="date" id="data-input" class="input-registro font-bold">
                </div>
            </div>

            <div class="bg-slate-50 p-8 rounded-[2rem] border-2 border-dashed border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-8 items-end">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Horário</label>
                    <input type="time" id="leitura-hora" class="input-registro">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Vazão Mensurada (L/h)</label>
                    <input type="number" id="leitura-vazao" step="any" placeholder="0.00" class="input-registro">
                </div>
                <button onclick="adicionarLeitura()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 px-8 rounded-2xl uppercase text-sm shadow-xl shadow-emerald-100 transition-all active:scale-95">
                    Adicionar à Tabela
                </button>
            </div>
        </div>

        <!-- RELATÓRIO LADO A LADO -->
        <div id="relatorio-export" class="p-12 md:p-20 rounded-[4rem] shadow-2xl border border-slate-100 overflow-hidden">
            <!-- Cabeçalho -->
            <div class="flex flex-col md:flex-row justify-between items-center border-b-[10px] border-slate-900 pb-12 mb-12 gap-10">
                <div class="flex items-center gap-10">
                    <img src="https://i.imgur.com/wEozr34.png" alt="Logo" class="h-32 w-auto">
                    <div>
                        <h1 class="text-5xl font-[900] text-slate-900 tracking-tighter leading-none">TESTE DE VAZÃO</h1>
                        <p class="text-emerald-600 font-black uppercase tracking-[0.5em] text-lg mt-3">Fazenda Oasis</p>
                    </div>
                </div>
                <div class="bg-slate-900 p-10 rounded-[2.5rem] min-w-[350px] text-center shadow-2xl">
                    <span class="text-[10px] font-black text-emerald-400 uppercase block mb-2 tracking-[0.2em]">Identificação</span>
                    <p class="text-3xl font-black text-white uppercase" id="display-poco">---</p>
                </div>
            </div>

            <!-- TABELA MULTI-COLUNAS -->
            <div class="mb-16">
                <div id="tabela-comparativa" class="flex flex-row overflow-x-auto rounded-[2rem] border-4 border-slate-900 min-h-[400px]">
                    <!-- Colunas de datas serão inseridas aqui via JS -->
                    <div class="w-full flex items-center justify-center p-20 text-slate-200 font-black text-2xl uppercase italic tracking-widest" id="placeholder-text">
                        Aguardando dados para comparação...
                    </div>
                </div>
            </div>

            <!-- Gráfico Comparativo -->
            <div class="mt-20 bg-slate-50 p-12 rounded-[4rem] border-2 border-slate-100">
                <div class="flex items-center gap-4 mb-12">
                    <div class="h-3 w-20 bg-emerald-500 rounded-full"></div>
                    <h3 class="font-black text-slate-900 text-2xl uppercase tracking-[0.3em]">Comportamento Comparativo</h3>
                </div>
                <div class="chart-container">
                    <canvas id="graficoVazao"></canvas>
                </div>
            </div>
            
            <!-- Rodapé Técnico -->
            <div class="mt-24 pt-16 border-t-4 border-slate-100 flex justify-between items-end">
                <div class="text-left">
                    <p class="text-sm text-slate-400 font-black uppercase tracking-[0.8em]">Fazenda Oasis</p>
                    <p class="text-[10px] text-slate-300 uppercase font-bold">Relatório gerado automaticamente • v3.0 Lado a Lado</p>
                </div>
                <div class="bg-slate-50 p-8 rounded-3xl text-right">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Média Geral do Teste</p>
                    <p class="text-3xl font-[900] text-emerald-600" id="media-geral">0 L/h</p>
                </div>
            </div>
        </div>

        <!-- BOTÕES -->
        <div class="flex flex-col md:flex-row gap-8 no-print pb-40 max-w-[1400px] mx-auto">
            <button onclick="baixarJPEG()" class="flex-[3] bg-slate-900 hover:bg-black text-white font-black py-10 rounded-[2.5rem] shadow-2xl transition-all flex items-center justify-center gap-8 uppercase tracking-[0.2em] text-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                Exportar Relatório Lado a Lado (JPEG)
            </button>
            <button onclick="resetarDados()" class="flex-1 bg-white border-4 border-slate-100 text-slate-300 font-black py-10 rounded-[2.5rem] hover:bg-red-50 hover:text-red-500 transition-all uppercase text-xs tracking-widest">
                Zerar Sistema
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-16 py-8 rounded-full shadow-2xl transform translate-y-64 transition-transform duration-500 z-50">
        <span id="toast-msg" class="font-black text-sm uppercase tracking-widest"></span>
    </div>

    <script>
        let dadosLeitura = [];
        let chartInstance = null;

        Chart.register(ChartDataLabels);

        window.onload = () => {
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('data-input').value = hoje;
            document.getElementById('poco-nome').addEventListener('input', (e) => {
                document.getElementById('display-poco').innerText = e.target.value.toUpperCase() || "---";
            });
            inicializarGrafico();
        };

        function adicionarLeitura() {
            const dataVal = document.getElementById('data-input').value;
            const hora = document.getElementById('leitura-hora').value;
            const vazao = parseFloat(document.getElementById('leitura-vazao').value);

            if (!dataVal || !hora || isNaN(vazao)) {
                showToast("⚠️ PREENCHA TODOS OS CAMPOS");
                return;
            }

            dadosLeitura.push({ data: dataVal, hora: hora, vazao: vazao });
            dadosLeitura.sort((a, b) => {
                if (a.data !== b.data) return new Date(a.data) - new Date(b.data);
                return a.hora.localeCompare(b.hora);
            });

            renderizarTabelaLadoALado();
            atualizarGrafico();
            ajustarLargura();
            
            document.getElementById('leitura-vazao').value = '';
            showToast("✅ REGISTRADO");
        }

        function ajustarLargura() {
            const container = document.getElementById('relatorio-export');
            const datasDistintas = [...new Set(dadosLeitura.map(d => d.data))].length;
            
            // Cada nova data adiciona 350px de largura lateral
            let novaLargura = 1200 + (datasDistintas > 1 ? (datasDistintas - 1) * 400 : 0);
            container.style.width = Math.max(1200, novaLargura) + "px";
        }

        function renderizarTabelaLadoALado() {
            const container = document.getElementById('tabela-comparativa');
            const placeholder = document.getElementById('placeholder-text');
            container.innerHTML = '';
            
            if (dadosLeitura.length === 0) {
                container.appendChild(placeholder);
                document.getElementById('media-geral').innerText = '0 L/h';
                return;
            }

            // Agrupa dados por data
            const grupos = dadosLeitura.reduce((acc, curr) => {
                if (!acc[curr.data]) acc[curr.data] = [];
                acc[curr.data].push(curr);
                return acc;
            }, {});

            Object.keys(grupos).forEach(data => {
                const [ano, mes, dia] = data.split('-');
                const col = document.createElement('div');
                col.className = "data-column flex flex-col";
                
                // Cabeçalho da coluna (Data)
                const header = document.createElement('div');
                header.className = "bg-slate-900 text-white p-6 text-center font-black text-xl border-b-2 border-slate-700";
                header.innerText = `${dia}/${mes}/${ano}`;
                col.appendChild(header);

                // Sub-cabeçalho (Labels)
                const subHeader = document.createElement('div');
                subHeader.className = "grid grid-cols-2 bg-slate-100 border-b border-slate-200 p-4 text-[10px] font-black uppercase text-slate-500 text-center";
                subHeader.innerHTML = '<div>Horário</div><div>Vazão (L/h)</div>';
                col.appendChild(subHeader);

                // Lista de vazões
                grupos[data].forEach((item, idx) => {
                    const row = document.createElement('div');
                    row.className = "row-item grid grid-cols-2 border-b border-slate-50 p-5 text-center items-center relative";
                    
                    // Encontra o index global para exclusão
                    const globalIdx = dadosLeitura.findIndex(d => d === item);

                    row.innerHTML = `
                        <div class="font-bold text-slate-400 text-lg">${item.hora}</div>
                        <div class="font-black text-emerald-600 text-2xl">${item.vazao.toLocaleString('pt-BR')}</div>
                        <button onclick="excluirRegistro(${globalIdx})" class="btn-del absolute right-2 text-red-200 hover:text-red-500 no-print">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>
                        </button>
                    `;
                    col.appendChild(row);
                });

                // Rodapé da coluna (Média do Dia)
                const mediaDia = grupos[data].reduce((acc, c) => acc + c.vazao, 0) / grupos[data].length;
                const footer = document.createElement('div');
                footer.className = "mt-auto bg-slate-50 p-6 border-t-2 border-slate-200 text-center";
                footer.innerHTML = `
                    <div class="text-[9px] font-black text-slate-400 uppercase">Média do Dia</div>
                    <div class="text-xl font-black text-slate-800">${mediaDia.toLocaleString('pt-BR', {maximumFractionDigits: 1})} L/h</div>
                `;
                col.appendChild(footer);

                container.appendChild(col);
            });

            const mediaGeral = dadosLeitura.reduce((acc, c) => acc + c.vazao, 0) / dadosLeitura.length;
            document.getElementById('media-geral').innerText = mediaGeral.toLocaleString('pt-BR', {maximumFractionDigits: 1}) + ' L/h';
        }

        function excluirRegistro(index) {
            dadosLeitura.splice(index, 1);
            renderizarTabelaLadoALado();
            atualizarGrafico();
            ajustarLargura();
            showToast("🗑️ REMOVIDO");
        }

        function inicializarGrafico() {
            const ctx = document.getElementById('graficoVazao').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: [], datasets: [{ data: [], backgroundColor: '#10b981', borderRadius: 10 }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { top: 60, bottom: 20 } },
                    plugins: { 
                        legend: { display: false },
                        datalabels: { 
                            display: true, 
                            align: 'top', 
                            anchor: 'end', 
                            color: '#064e3b', 
                            font: { size: 14, weight: '900' },
                            formatter: (v) => v.toLocaleString('pt-BR')
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { weight: 'bold' } } },
                        x: { grid: { display: false }, ticks: { font: { weight: '900', size: 12 } } }
                    }
                }
            });
        }

        function atualizarGrafico() {
            const labels = dadosLeitura.map(d => {
                const [ano, mes, dia] = d.data.split('-');
                return [`${dia}/${mes}`, d.hora];
            });
            const valores = dadosLeitura.map(d => d.vazao);

            chartInstance.data.labels = labels;
            chartInstance.data.datasets[0].data = valores;

            // Cores alternadas por data
            const cores = [];
            let lastDate = "";
            let colorToggle = true;
            dadosLeitura.forEach(d => {
                if(d.data !== lastDate) {
                    colorToggle = !colorToggle;
                    lastDate = d.data;
                }
                cores.push(colorToggle ? '#10b981' : '#3b82f6');
            });
            chartInstance.data.datasets[0].backgroundColor = cores;
            chartInstance.update();
        }

        async function baixarJPEG() {
            if (dadosLeitura.length === 0) return;
            const relatorio = document.getElementById('relatorio-export');
            showToast("📸 GERANDO IMAGEM DE ALTA RESOLUÇÃO...");
            
            try {
                const canvas = await html2canvas(relatorio, {
                    scale: 2, 
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    width: relatorio.scrollWidth,
                    height: relatorio.scrollHeight,
                    scrollX: 0,
                    scrollY: 0
                });
                
                const link = document.createElement('a');
                const poco = document.getElementById('poco-nome').value || 'FAZENDA_OASIS';
                link.download = `RELATORIO_VAZAO_COMPLETO_${poco.replace(/\s+/g, '_')}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
                showToast("✅ DOWNLOAD REALIZADO!");
            } catch (err) {
                showToast("❌ ERRO AO EXPORTAR");
                console.error(err);
            }
        }

        function resetarDados() {
            if (confirm("ATENÇÃO: Deseja apagar todos os registros e começar um novo teste?")) {
                dadosLeitura = [];
                renderizarTabelaLadoALado();
                atualizarGrafico();
                ajustarLargura();
                showToast("🧹 SISTEMA REINICIADO");
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-64');
            setTimeout(() => toast.classList.add('translate-y-64'), 4000);
        }
    </script>
</body>
</html>
